{% extends "dashboard/base.html" %}

{% block title %}Session Detail{% endblock %}

{% block content %}
<!-- Data attribute for JS to read session_id -->
<div id="session-data" data-session-id="{{ session_id }}"></div>

<div class="page-header">
    <h2>Session Detail</h2>
    <p>Full request chain and timeline</p>
</div>

<div class="page-body">
    <button class="btn-back" onclick="window.location.href='/dashboard/sessions'">← Back to Sessions</button>

    <!-- Session Header Card (populated by JS) -->
    <div class="detail-card" id="session-header">
        <div class="skeleton skeleton-card"></div>
    </div>

    <!-- AI Summary Section -->
    <div class="section">
        <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
            <h3>AI Forensic Summary</h3>
            <button id="btn-generate-summary" class="btn-action" style="padding: 8px 16px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">Generate AI Summary ✨</button>
        </div>
        <div id="ai-summary-container" style="display: none; background: #1e1e1e; padding: 15px; border-radius: 6px; margin-top: 10px; border-left: 4px solid #007bff;">
            <div id="ai-summary-content"></div>
        </div>
    </div>

    <!-- Request Timeline (populated by JS) -->
    <div class="section">
        <div class="section-header">
            <h3>Request Timeline</h3>
        </div>
        <div id="request-timeline">
            <div class="skeleton skeleton-row"></div>
            <div class="skeleton skeleton-row"></div>
            <div class="skeleton skeleton-row"></div>
            <div class="skeleton skeleton-row"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/detail.js"></script>
{% endblock %}
